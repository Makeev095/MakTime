services:
  maktime:
    build: .
    container_name: maktime
    restart: unless-stopped
    env_file: .env
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_PATH=/app/server/db/maktime.db
    volumes:
      - maktime-db:/app/server/db
      - maktime-uploads:/app/server/uploads
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: maktime-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      - maktime

  coturn:
    image: coturn/coturn:latest
    container_name: maktime-turn
    restart: unless-stopped
    network_mode: host
    command: >
      turnserver -n
      --lt-cred-mech
      --user=${TURN_USER:-maktime}:${TURN_PASS:-MakTimeT0rn2026!}
      --realm=${TURN_REALM:-maktime.space}
      --fingerprint
      --no-tls
      --no-dtls
      --listening-port=3478
      --min-port=49152
      --max-port=49252
      --log-file=stdout

volumes:
  maktime-db:
  maktime-uploads:
  certbot-webroot:
