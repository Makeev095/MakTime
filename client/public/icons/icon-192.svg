<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B73FF"/>
      <stop offset="100%" style="stop-color:#6C63FF"/>
    </linearGradient>
  </defs>
  <!-- Rounded purple background -->
  <rect width="192" height="192" rx="36" ry="36" fill="url(#bg)"/>
  <!-- Speech bubble with clock -->
  <g transform="translate(96, 96)">
    <!-- Bubble body -->
    <path fill="white" fill-opacity="0.95" d="
      M -38 -28
      C -38 -38 -28 -46 -18 -46
      L 18 -46
      C 28 -46 38 -38 38 -28
      L 38 18
      C 38 28 28 36 18 36
      L 0 36
      L -10 48
      L -10 36
      L -18 36
      C -28 36 -38 28 -38 18
      Z
    "/>
    <!-- Clock face -->
    <circle cx="0" cy="-6" r="12" fill="none" stroke="#6C63FF" stroke-width="2.5"/>
    <!-- Clock hands: 12 o'clock and 3 o'clock -->
    <line x1="0" y1="-6" x2="0" y2="-13" stroke="#6C63FF" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="-6" x2="6" y2="-2" stroke="#6C63FF" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
